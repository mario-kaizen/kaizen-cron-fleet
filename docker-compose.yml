# =============================================================================
# Kaizen Cron Fleet — All Services
# =============================================================================
# 1.  sync-stripe-revenue        — Daily Stripe revenue sync (6:30pm AEST)
# 2.  detect-wins                — Daily win detection (1:00am AEST)
# 3.  smart-scanner              — Smart scanner every 4 hours
# 4.  meta-ads-sync              — Daily Meta ads sync (midnight AEST)
# 5.  stripe-notion-sync         — Daily Stripe→Notion sync (8:00pm AEST)
# 6.  notion-sync                — Notion sync every 15min (8pm–12pm AEST)
# 7.  client-health-engine       — Daily client health engine (7:30pm AEST)
# 8.  client-performance-sync    — Weekly client performance (Sun 9:05pm AEST)
# 9.  content-digest             — Weekly content digest (Fri 5:00am AEST)
# 10. notification-poller        — Notification poller every 15min (8pm–12pm AEST)
# 11. mindbody-sync              — Daily Mindbody→GHL sync (10:00am AEST)
# 12. health-check               — Daily Lighthouse health ping (noon AEST)
# =============================================================================

services:
  sync-stripe-revenue:
    build: ./cron-http
    environment:
      CRON_NAME: "sync-stripe-revenue"
      CRON_SCHEDULE: "30 18 * * *"
      CRON_ENDPOINT: "/api/cron/sync-stripe-revenue"
      CRON_SECRET: "${CRON_SECRET}"
      SESSION_SECRET: "${SESSION_SECRET}"
      BASE_URL: "https://lighthouse.mariopaguio.com"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_CHANNEL_ID: "C0ALM9P8DQD"
    restart: unless-stopped

  detect-wins:
    build: ./cron-http

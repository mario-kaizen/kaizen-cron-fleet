services:
  sync-stripe-revenue:
    build: ./cron-http
    environment:
      CRON_NAME: "sync-stripe-revenue"
      CRON_SCHEDULE: "30 18 * * *"
      CRON_ENDPOINT: "/api/cron/sync-stripe-revenue"
      CRON_SECRET: "${CRON_SECRET}"
      SESSION_SECRET: "${SESSION_SECRET}"
      BASE_URL: "https://lighthouse.mariopaguio.com"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_CHANNEL_ID: "C0ALM9P8DQD"
    restart: unless-stopped

